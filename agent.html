<style>
  :root { --blue:#006AFF; --dark-blue:#0050CC; --navy:#0a1f44; --green:#00C853; --ai-green:#00FF9D; --red:#E8341C; --bg:#F7F7F7; --white:#fff; --text:#1A1A1A; --gray:#6B6B6B; --border:#D8D8D8; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Nunito Sans',sans-serif; background:var(--bg); color:var(--text); }
  nav { background:#111; border-bottom:1px solid rgba(0,255,157,0.12); padding:0 24px; height:60px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
  .logo { font-family:'Bebas Neue',sans-serif; font-size:22px; text-decoration:none; color:var(--text); }
  .logo span { color:var(--blue); } .logo em { color:var(--red); font-style:normal; } .logo sup { color:var(--ai-green); font-size:13px; }
  .nav-back { font-size:13px; color:rgba(255,255,255,0.7); text-decoration:none; font-weight:700; transition:color 0.2s; }
  .nav-back:hover { color:#00FF9D; }
  .page { max-width:1000px; margin:0 auto; padding:40px 24px; }
  .loading { text-align:center; padding:80px; color:var(--gray); }
  .not-found { text-align:center; padding:80px; }

  /* PROFILE HERO */
  .profile-hero { background:white; border-radius:16px; padding:36px; box-shadow:0 2px 12px rgba(0,0,0,0.08); margin-bottom:28px; display:flex; gap:28px; align-items:flex-start; flex-wrap:wrap; }
  .profile-avi { width:100px; height:100px; border-radius:50%; background:var(--blue); display:flex; align-items:center; justify-content:center; font-size:32px; font-weight:700; color:white; flex-shrink:0; overflow:hidden; border:4px solid white; box-shadow:0 2px 12px rgba(0,0,0,0.12); }
  .profile-avi img { width:100%; height:100%; object-fit:cover; }
  .profile-header-info { flex:1; min-width:240px; }
  .profile-name { font-family:'Nunito',sans-serif; font-weight:900; font-size:28px; }
  .profile-brokerage { font-size:15px; color:var(--gray); margin-top:4px; }
  .profile-meta-row { display:flex; gap:20px; margin-top:12px; flex-wrap:wrap; }
  .meta-item { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--gray); }
  .meta-item a { color:var(--blue); text-decoration:none; font-weight:600; }
  .profile-badge { display:inline-flex; align-items:center; gap:5px; background:#E8FBF0; color:var(--green); font-size:12px; font-weight:700; padding:4px 10px; border-radius:5px; margin-top:10px; }
  .profile-bio { font-size:14px; color:var(--text); line-height:1.7; margin-top:14px; max-width:600px; }
  .profile-actions { display:flex; gap:10px; margin-top:16px; flex-wrap:wrap; }
  .btn-blue { background:var(--blue); color:white; padding:11px 24px; border-radius:8px; text-decoration:none; font-family:'Nunito',sans-serif; font-weight:900; font-size:14px; border:none; cursor:pointer; }
  .btn-outline { background:transparent; color:var(--blue); border:1.5px solid var(--blue); padding:10px 20px; border-radius:8px; text-decoration:none; font-family:'Nunito',sans-serif; font-weight:700; font-size:13px; cursor:pointer; }

  /* EDIT PANEL */
  .edit-panel { background:white; border-radius:16px; padding:36px; box-shadow:0 2px 12px rgba(0,0,0,0.08); margin-bottom:28px; display:none; }
  .edit-title { font-family:'Nunito',sans-serif; font-weight:900; font-size:20px; margin-bottom:20px; padding-bottom:16px; border-bottom:1px solid var(--border); }
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .form-group { margin-bottom:14px; }
  .form-group label { display:block; font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:5px; }
  .form-group input, .form-group select, .form-group textarea { width:100%; padding:11px 14px; border:1.5px solid var(--border); border-radius:8px; font-family:'Nunito Sans',sans-serif; font-size:14px; outline:none; transition:border-color 0.2s; background:white; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(0,106,255,0.1); }
  .form-group textarea { min-height:90px; resize:vertical; }
  .error-msg { background:#fff5f5; border:1px solid #ffcccc; color:var(--red); padding:10px 14px; border-radius:8px; font-size:13px; margin-bottom:14px; display:none; }
  .success-msg { background:#f0fff8; border:1px solid #b3f0d0; color:#00843d; padding:10px 14px; border-radius:8px; font-size:13px; margin-bottom:14px; display:none; }

  /* LISTINGS */
  .section-title { font-family:'Nunito',sans-serif; font-weight:900; font-size:20px; margin-bottom:16px; }
  .listings-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
  .listing-card { background:white; border-radius:10px; overflow:hidden; box-shadow:0 1px 6px rgba(0,0,0,0.07); cursor:pointer; transition:transform 0.2s, box-shadow 0.2s; }
  .listing-card:hover { transform:translateY(-2px); box-shadow:0 4px 16px rgba(0,0,0,0.12); }
  .listing-img { height:150px; position:relative; overflow:hidden; background:linear-gradient(135deg,#c8d8f0,#a8c0e8); }
  .listing-img img { width:100%; height:100%; object-fit:cover; display:block; }
  .listing-body { padding:14px; }
  .listing-price { font-family:'Nunito',sans-serif; font-weight:900; font-size:18px; }
  .listing-commission { font-size:11px; color:var(--green); font-weight:700; margin-top:2px; }
  .listing-addr { font-size:12px; color:var(--gray); margin-top:4px; }
  .listing-specs { font-size:11px; color:var(--gray); margin-top:4px; }
  .empty { text-align:center; padding:40px; color:var(--gray); font-size:14px; }

  @media(max-width:768px) { .profile-hero { flex-direction:column; } .listings-grid { grid-template-columns:1fr 1fr; } .form-grid { grid-template-columns:1fr; } }
  @media(max-width:500px) { .listings-grid { grid-template-columns:1fr; } }

  <!-- EDIT PANEL -->

<script>
const { createClient } = window.supabase || supabase;
const sb = createClient(
  'https://pneixwmkphakoxmzkblx.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBuZWl4d21rcGhha294bXprYmx4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNjE2NDAsImV4cCI6MjA4OTYzNzY0MH0.SDwzNkVCehQQqDkmj_516iFD-jphjGF1u43l19SAN_0'
);

const DEMO_PHOTOS = [
  'https://images.pexels.com/photos/1396122/pexels-photo-1396122.jpeg?auto=compress&cs=tinysrgb&w=600&h=400&fit=crop',
  'https://images.pexels.com/photos/1029599/pexels-photo-1029599.jpeg?auto=compress&cs=tinysrgb&w=600&h=400&fit=crop',
  'https://images.pexels.com/photos/2102587/pexels-photo-2102587.jpeg?auto=compress&cs=tinysrgb&w=600&h=400&fit=crop',
  'https://images.pexels.com/photos/1643383/pexels-photo-1643383.jpeg?auto=compress&cs=tinysrgb&w=600&h=400&fit=crop',
];

const params = new URLSearchParams(window.location.search);
const agentId = params.get('id');
const editMode = params.get('edit') === 'true';
let currentAgent = null;

function parsePhotos(raw) {
  if (!raw) return [];
  if (Array.isArray(raw)) return raw.filter(Boolean);
  if (typeof raw === 'string') {
    if (raw.startsWith('[')) { try { const p=JSON.parse(raw); return Array.isArray(p)?p.filter(Boolean):[]; } catch(e){} }
    if (raw.startsWith('{') && raw.endsWith('}')) {
      return raw.slice(1,-1).split(',').map(s=>s.trim().replace(/^"|"$/g,'')).filter(s=>s.startsWith('http'));
    }
    if (raw.startsWith('http')) return [raw];
  }
  return [];
}

async function init() {
  if (!agentId) { showNotFound(); return; }

  const { data: agent, error } = await sb.from('agents').select('*').eq('id', agentId).single();
  if (error || !agent) { showNotFound(); return; }
  currentAgent = agent;

  const agentTitle = `${'$'}{agent.first_name} ${'$'}{agent.last_name}${'$'}{agent.brokerage ? ' · '+agent.brokerage : ''} | GOZ`;
  const agentDesc = `Licensed real estate agent${'$'}{agent.markets_served ? ' in '+agent.markets_served : ''}. ${'$'}{agent.commission_rate || '2.5%'} commission · Direct contact · Free listings on GOZ.`;
  const agentImg = agent.photo_url || 'https://images.pexels.com/photos/1396122/pexels-photo-1396122.jpeg?auto=compress&cs=tinysrgb&w=1200&h=630&fit=crop';
  const agentUrl = `https://getoffzillow.com/agent.html?id=${'$'}{agent.id}`;
  document.title = agentTitle;
  document.getElementById('og-title').setAttribute('content', agentTitle);
  document.getElementById('og-desc').setAttribute('content', agentDesc);
  document.getElementById('og-image').setAttribute('content', agentImg);
  document.getElementById('og-url').setAttribute('content', agentUrl);
  document.getElementById('tw-title').setAttribute('content', agentTitle);
  document.getElementById('tw-desc').setAttribute('content', agentDesc);
  document.getElementById('tw-image').setAttribute('content', agentImg);
  document.getElementById('loadingEl').style.display = 'none';
  document.getElementById('profileContent').style.display = 'block';
  renderProfile();
  loadListings();

  // Check if current user owns this profile
  const { data: { session } } = await sb.auth.getSession();
  if (session && session.user.id === agent.user_id) {
    // Show edit button
    document.getElementById('profileActions').innerHTML += `
      <button class="btn-outline" onclick="toggleEdit(true)">Edit Profile</button>
      <a href="dashboard.html" class="btn-outline">← Dashboard</a>`;
    if (editMode) toggleEdit(true);
  }
}

function renderProfile() {
  const a = currentAgent;
  const avi = a.photo_url
    ? `<img src="${a.photo_url}" alt="${a.first_name}" />`
    : (a.first_name?.[0]||'') + (a.last_name?.[0]||'');
  document.getElementById('profileAvi').innerHTML = avi;
  document.getElementById('profileName').textContent = `${a.first_name} ${a.last_name}`;
  document.getElementById('profileBrokerage').textContent = [a.brokerage, a.state].filter(Boolean).join(' · ');

  const meta = [];
  if (a.phone) meta.push(`<div class="meta-item">📞 <a href="tel:${a.phone}">${a.phone}</a></div>`);
  if (a.email) meta.push(`<div class="meta-item">📧 <a href="mailto:${a.email}">${a.email}</a></div>`);
  if (a.website) meta.push(`<div class="meta-item">🌐 <a href="${a.website}" target="_blank">${a.website.replace(/^https?:\/\//,'')}</a></div>`);
  if (a.markets_served) meta.push(`<div class="meta-item">📍 ${a.markets_served}</div>`);
  if (a.commission_rate) meta.push(`<div class="meta-item">💰 ${a.commission_rate} commission</div>`);
  document.getElementById('profileMeta').innerHTML = meta.join('');

  if (a.bio) {
    document.getElementById('profileBio').textContent = a.bio;
    document.getElementById('profileBio').style.display = 'block';
  }

  if (a.email) {
    document.getElementById('profileActions').innerHTML =
      `<a href="mailto:${a.email}" class="btn-blue">Contact ${a.first_name} →</a>`;
  }
}

async function loadListings() {
  const { data: listings } = await sb
    .from('listings')
    .select('id, address, city, state, price, beds, baths, sqft, commission_rate, photos')
    .eq('agent_id', agentId)
    .eq('status', 'active')
    .order('created_at', { ascending: false });

  const count = (listings || []).length;
  document.getElementById('listingsTitle').textContent = `${count} Active Listing${count !== 1 ? 's' : ''}`;

  if (!count) {
    document.getElementById('listingsContainer').innerHTML = '<div class="empty">No active listings right now.</div>';
    return;
  }

  document.getElementById('listingsContainer').innerHTML = `<div class="listings-grid">` +
    listings.map((l, i) => {
      const photos = parsePhotos(l.photos);
      const photo = photos.length > 0 ? photos[0] : DEMO_PHOTOS[i % DEMO_PHOTOS.length];
      return `
      <div class="listing-card" onclick="window.location.href='listing.html?id=${l.id}'">
        <div class="listing-img"><img src="${photo}" alt="${l.address}" onerror="this.src='${DEMO_PHOTOS[i%DEMO_PHOTOS.length]}'" /></div>
        <div class="listing-body">
          <div class="listing-price">$${Number(l.price).toLocaleString()}</div>
          <div class="listing-commission">✓ ${l.commission_rate} commission — public</div>
          <div class="listing-addr">${l.address}, ${l.city}, ${l.state}</div>
          <div class="listing-specs">${l.beds?l.beds+'bd':''} ${l.baths?l.baths+'ba':''} ${l.sqft?Number(l.sqft).toLocaleString()+' sqft':''}</div>
        </div>
      </div>`;
    }).join('') + `</div>`;
}

let selectedPhotoFile = null;

function previewPhoto(e) {
  const file = e.target.files[0];
  if (!file) return;
  selectedPhotoFile = file;
  const url = URL.createObjectURL(file);
  const preview = document.getElementById('photoPreview');
  preview.innerHTML = `<img src="${url}" style="width:100%;height:100%;object-fit:cover">`;
}

async function uploadProfilePhoto(agentId) {
  if (!selectedPhotoFile) return null;
  const status = document.getElementById('photoUploadStatus');
  status.textContent = 'Uploading photo...';
  status.style.display = 'block';
  const ext = selectedPhotoFile.name.split('.').pop().toLowerCase() || 'jpg';
  const path = `agents/${agentId}/headshot.${ext}`;
  const { error } = await sb.storage.from('listing-photos').upload(path, selectedPhotoFile, { upsert: true, contentType: selectedPhotoFile.type });
  if (error) { status.textContent = 'Photo upload failed: ' + error.message; return null; }
  const { data } = sb.storage.from('listing-photos').getPublicUrl(path);
  status.textContent = 'Photo uploaded ✓';
  return data.publicUrl;
}

function toggleEdit(open) {
  document.getElementById('editPanel').style.display = open ? 'block' : 'none';
  if (open) {
    const a = currentAgent;
    document.getElementById('ef_first').value = a.first_name || '';
    document.getElementById('ef_last').value = a.last_name || '';
    document.getElementById('ef_phone').value = a.phone || '';
    document.getElementById('ef_brokerage').value = a.brokerage || '';
    document.getElementById('ef_license').value = a.license_number || '';
    document.getElementById('ef_state').value = a.state || '';
    document.getElementById('ef_commission').value = a.commission_rate || '2.5%';
    document.getElementById('ef_website').value = a.website || '';
    document.getElementById('ef_markets').value = a.markets_served || '';
    document.getElementById('ef_bio').value = a.bio || '';
    // Show current photo in preview
    if (a.photo_url) {
      document.getElementById('photoPreview').innerHTML = `<img src="${a.photo_url}" style="width:100%;height:100%;object-fit:cover">`;
    }
    selectedPhotoFile = null;
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

async function saveProfile() {
  const btn = document.getElementById('saveBtn');
  const errEl = document.getElementById('editErr');
  const okEl = document.getElementById('editOk');
  errEl.style.display = 'none'; okEl.style.display = 'none';

  btn.disabled = true; btn.textContent = 'Saving...';

  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'signup.html'; return; }

  // Upload photo if selected
  let photoUrl = currentAgent.photo_url || null;
  if (selectedPhotoFile) {
    const uploaded = await uploadProfilePhoto(agentId);
    if (uploaded) photoUrl = uploaded;
  }

  const updates = {
    first_name: document.getElementById('ef_first').value.trim(),
    last_name: document.getElementById('ef_last').value.trim(),
    phone: document.getElementById('ef_phone').value.trim() || null,
    brokerage: document.getElementById('ef_brokerage').value.trim() || null,
    license_number: document.getElementById('ef_license').value.trim() || null,
    state: document.getElementById('ef_state').value || null,
    commission_rate: document.getElementById('ef_commission').value,
    website: document.getElementById('ef_website').value.trim() || null,
    markets_served: document.getElementById('ef_markets').value.trim() || null,
    bio: document.getElementById('ef_bio').value.trim() || null,
    photo_url: photoUrl,
  };

  if (!updates.first_name || !updates.last_name) {
    errEl.textContent = 'First and last name are required.';
    errEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Save Changes →';
    return;
  }

  const { error } = await sb.from('agents').update(updates).eq('id', agentId);

  if (error) {
    errEl.textContent = error.message;
    errEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Save Changes →';
    return;
  }

  currentAgent = { ...currentAgent, ...updates };
  localStorage.setItem('goz_name', `${updates.first_name} ${updates.last_name}`);
  okEl.textContent = '✅ Profile updated!';
  okEl.style.display = 'block';
  renderProfile();
  btn.disabled = false; btn.textContent = 'Save Changes →';
  setTimeout(() => toggleEdit(false), 1500);
}

function showNotFound() {
  document.getElementById('loadingEl').style.display = 'none';
  document.getElementById('notFoundEl').style.display = 'block';
}

init();
</script>
