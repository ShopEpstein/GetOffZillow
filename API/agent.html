<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Profile — GetOffZillow AI</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root { --blue:#006AFF; --dark-blue:#0050CC; --navy:#0a1f44; --green:#00C853; --ai-green:#00FF9D; --red:#E8341C; --bg:#F7F7F7; --white:#fff; --text:#1A1A1A; --gray:#6B6B6B; --border:#D8D8D8; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Nunito Sans',sans-serif; background:var(--bg); color:var(--text); }

  nav { background:white; border-bottom:1px solid var(--border); padding:0 24px; height:60px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
  .nav-logo { font-family:'Bebas Neue',sans-serif; font-size:24px; text-decoration:none; color:var(--text); }
  .nav-logo span { color:var(--blue); } .nav-logo em { color:var(--red); font-style:normal; } .nav-logo sup { color:var(--ai-green); font-size:14px; }
  .nav-back { font-size:13px; color:var(--blue); text-decoration:none; font-weight:700; }

  .page { max-width:1000px; margin:0 auto; padding:40px 24px; }

  /* PROFILE HEADER */
  .profile-hero { background:white; border-radius:16px; padding:36px; box-shadow:0 2px 12px rgba(0,0,0,0.08); margin-bottom:28px; display:flex; gap:28px; align-items:flex-start; }
  .profile-avi-lg { width:100px; height:100px; border-radius:50%; background:var(--blue); display:flex; align-items:center; justify-content:center; font-size:36px; font-weight:700; color:white; flex-shrink:0; overflow:hidden; border:4px solid white; box-shadow:0 2px 12px rgba(0,0,0,0.12); }
  .profile-avi-lg img { width:100%; height:100%; object-fit:cover; }
  .profile-header-info { flex:1; }
  .profile-name { font-family:'Nunito',sans-serif; font-weight:900; font-size:28px; }
  .profile-brokerage { font-size:15px; color:var(--gray); margin-top:4px; }
  .profile-meta-row { display:flex; gap:20px; margin-top:12px; flex-wrap:wrap; }
  .meta-item { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--gray); }
  .meta-item a { color:var(--blue); text-decoration:none; font-weight:600; }
  .meta-item a:hover { text-decoration:underline; }
  .profile-badge { display:inline-flex; align-items:center; gap:5px; background:#E8FBF0; color:var(--green); font-size:12px; font-weight:700; padding:4px 10px; border-radius:5px; margin-top:10px; }
  .profile-bio { font-size:14px; color:var(--text); line-height:1.7; margin-top:14px; }
  .contact-agent-btn { margin-top:16px; background:var(--blue); color:white; border:none; padding:12px 28px; border-radius:8px; font-family:'Nunito',sans-serif; font-weight:900; font-size:15px; cursor:pointer; transition:background 0.2s; text-decoration:none; display:inline-block; }
  .contact-agent-btn:hover { background:var(--dark-blue); }

  /* EDIT MODE */
  .edit-panel { background:white; border-radius:16px; padding:36px; box-shadow:0 2px 12px rgba(0,0,0,0.08); margin-bottom:28px; display:none; }
  .edit-panel.open { display:block; }
  .edit-title { font-family:'Nunito',sans-serif; font-weight:900; font-size:20px; margin-bottom:20px; padding-bottom:16px; border-bottom:1px solid var(--border); }
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .form-group { margin-bottom:14px; }
  .form-group label { display:block; font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:5px; }
  .form-group input, .form-group select, .form-group textarea { width:100%; padding:11px 14px; border:1.5px solid var(--border); border-radius:8px; font-family:'Nunito Sans',sans-serif; font-size:14px; outline:none; transition:border-color 0.2s; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(0,106,255,0.1); }
  .form-group textarea { min-height:90px; resize:vertical; }

  .photo-edit { display:flex; gap:16px; align-items:center; margin-bottom:20px; }
  .photo-current { width:64px; height:64px; border-radius:50%; background:var(--blue); display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:700; color:white; overflow:hidden; flex-shrink:0; }
  .photo-current img { width:100%; height:100%; object-fit:cover; }
  .photo-upload-btn { position:relative; }
  .photo-upload-btn input { position:absolute; inset:0; opacity:0; cursor:pointer; }
  .photo-upload-btn button { background:transparent; border:1.5px solid var(--blue); color:var(--blue); padding:8px 16px; border-radius:6px; font-size:13px; font-weight:700; cursor:pointer; }

  .save-btn { background:var(--ai-green); color:#000; border:none; padding:13px 32px; border-radius:8px; font-family:'Nunito',sans-serif; font-weight:900; font-size:15px; cursor:pointer; transition:all 0.2s; box-shadow:0 0 16px rgba(0,255,157,0.25); }
  .save-btn:hover { background:#00e88a; }
  .save-btn:disabled { background:var(--border); color:var(--gray); box-shadow:none; cursor:not-allowed; }
  .cancel-btn { background:transparent; color:var(--gray); border:1.5px solid var(--border); padding:13px 24px; border-radius:8px; font-family:'Nunito',sans-serif; font-weight:700; font-size:14px; cursor:pointer; margin-left:10px; }

  .error-msg { background:#fff5f5; border:1px solid #ffcccc; color:var(--red); padding:10px 14px; border-radius:8px; font-size:13px; margin-bottom:14px; display:none; }
  .success-msg { background:#f0fff8; border:1px solid #b3f0d0; color:#00843d; padding:10px 14px; border-radius:8px; font-size:13px; margin-bottom:14px; display:none; }

  /* LISTINGS */
  .section-title { font-family:'Nunito',sans-serif; font-weight:900; font-size:20px; margin-bottom:16px; }
  .listings-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
  .listing-card { background:white; border-radius:10px; overflow:hidden; box-shadow:0 1px 6px rgba(0,0,0,0.07); cursor:pointer; transition:transform 0.2s, box-shadow 0.2s; }
  .listing-card:hover { transform:translateY(-2px); box-shadow:0 4px 16px rgba(0,0,0,0.12); }
  .listing-img { height:150px; background:linear-gradient(135deg,#c8d8f0,#a8c0e8); display:flex; align-items:center; justify-content:center; font-size:36px; position:relative; overflow:hidden; }
  .listing-img img { width:100%; height:100%; object-fit:cover; position:absolute; inset:0; }
  .listing-body { padding:14px; }
  .listing-price { font-family:'Nunito',sans-serif; font-weight:900; font-size:18px; }
  .listing-commission { font-size:11px; color:var(--green); font-weight:700; margin-top:2px; }
  .listing-addr { font-size:12px; color:var(--gray); margin-top:4px; }
  .listing-specs { font-size:11px; color:var(--gray); margin-top:4px; }

  .empty { text-align:center; padding:40px; color:var(--gray); }
  .loading { text-align:center; padding:40px; color:var(--gray); }

  @media(max-width:768px) { .profile-hero { flex-direction:column; } .listings-grid { grid-template-columns:1fr 1fr; } .form-grid { grid-template-columns:1fr; } }
  @media(max-width:500px) { .listings-grid { grid-template-columns:1fr; } }
</style>
</head>
<body>
<script src="auth.js"></script>

<nav>
  <a href="index.html" class="nav-logo">Get<span>Off</span><em>Zillow</em><sup>AI</sup></a>
  <a href="index.html" class="nav-back" id="navBack">← All Listings</a>
</nav>

<div class="page">

  <div id="loadingState" class="loading">Loading agent profile...</div>
  <div id="notFoundState" style="display:none;text-align:center;padding:80px">
    <h2>Agent not found</h2>
    <p style="margin-top:8px"><a href="index.html" style="color:var(--blue)">← Back to search</a></p>
  </div>

  <!-- EDIT PANEL -->
  <div class="edit-panel" id="editPanel">
    <div class="edit-title">Edit Your Profile</div>
    <div class="error-msg" id="editError"></div>
    <div class="success-msg" id="editSuccess"></div>

    <div class="photo-edit">
      <div class="photo-current" id="editPhotoPreview"></div>
      <div class="photo-upload-btn">
        <input type="file" id="editPhotoInput" accept="image/*" onchange="previewEditPhoto(event)" />
        <button type="button">📸 Change Photo</button>
      </div>
      <span style="font-size:12px;color:var(--gray)">JPG or PNG — max 5MB</span>
    </div>

    <div class="form-grid">
      <div class="form-group"><label>First Name *</label><input id="ef_first" type="text" required /></div>
      <div class="form-group"><label>Last Name *</label><input id="ef_last" type="text" required /></div>
      <div class="form-group"><label>Phone</label><input id="ef_phone" type="tel" /></div>
      <div class="form-group"><label>Brokerage</label><input id="ef_brokerage" type="text" /></div>
      <div class="form-group"><label>License #</label><input id="ef_license" type="text" /></div>
      <div class="form-group"><label>State</label>
        <select id="ef_state">
          <option value="">Select...</option>
          <option value="FL">Florida</option><option value="AL">Alabama</option>
          <option value="GA">Georgia</option><option value="TN">Tennessee</option>
          <option value="TX">Texas</option><option value="CA">California</option><option value="Other">Other</option>
        </select>
      </div>
      <div class="form-group"><label>Commission Rate</label>
        <select id="ef_commission">
          <option value="2%">2%</option><option value="2.5%">2.5%</option>
          <option value="2.75%">2.75%</option><option value="3%">3%</option><option value="Negotiable">Negotiable</option>
        </select>
      </div>
      <div class="form-group"><label>Website</label><input id="ef_website" type="url" placeholder="https://yoursite.com" /></div>
    </div>
    <div class="form-group"><label>Markets You Serve</label><input id="ef_markets" type="text" placeholder="Pensacola, Navarre, Destin..." /></div>
    <div class="form-group"><label>Bio</label><textarea id="ef_bio" placeholder="Tell buyers about yourself..."></textarea></div>

    <button class="save-btn" id="saveBtn" onclick="saveProfile()">Save Changes →</button>
    <button class="cancel-btn" onclick="toggleEdit(false)">Cancel</button>
  </div>

  <!-- PUBLIC PROFILE -->
  <div id="profileContent" style="display:none">
    <div class="profile-hero">
      <div class="profile-avi-lg" id="profileAvi"></div>
      <div class="profile-header-info">
        <div class="profile-name" id="profileName"></div>
        <div class="profile-brokerage" id="profileBrokerage"></div>
        <div class="profile-meta-row" id="profileMeta"></div>
        <div class="profile-badge">🤖 GetOffZillow AI Agent · 1% fee at close</div>
        <div class="profile-bio" id="profileBio"></div>
        <div id="profileActions" style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap"></div>
      </div>
    </div>

    <h2 class="section-title" id="listingsTitle">Listings</h2>
    <div id="listingsContainer"><div class="loading">Loading listings...</div></div>
  </div>

</div>

<script>
const SUPABASE_URL = 'https://pneixwmkphakoxmzkblx.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBuZWl4d21rcGhha294bXprYmx4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNjE2NDAsImV4cCI6MjA4OTYzNzY0MH0.SDwzNkVCehQQqDkmj_516iFD-jphjGF1u43l19SAN_0';

const params = new URLSearchParams(window.location.search);
const agentId = params.get('id');
const editMode = params.get('edit') === 'true';
let currentAgent = null;
let newPhotoFile = null;

async function init() {
  if (!agentId) { showNotFound(); return; }

  // Edit mode — check ownership
  if (editMode) {
    const myId = GOZ_AUTH.getAgentId();
    if (!myId || myId !== agentId) {
      // Not the owner — just show profile
      window.history.replaceState(null, '', `agent.html?id=${agentId}`);
    }
  }

  await loadAgent();
}

async function loadAgent() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/agents?id=eq.${agentId}&limit=1`,
      { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` } }
    );
    const data = await res.json();
    if (!data.length) { showNotFound(); return; }
    currentAgent = data[0];

    document.title = `${currentAgent.first_name} ${currentAgent.last_name} — GetOffZillow AI`;
    renderProfile();
    loadListings();

    // Open edit panel if owner and edit=true
    const myId = GOZ_AUTH.getAgentId();
    if (editMode && myId === agentId) {
      toggleEdit(true);
    }
  } catch (e) {
    showNotFound();
  }
}

function renderProfile() {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('profileContent').style.display = 'block';

  const a = currentAgent;
  const avi = a.photo_url
    ? `<img src="${a.photo_url}" alt="${a.first_name}" />`
    : (a.first_name?.[0] || '') + (a.last_name?.[0] || '');

  document.getElementById('profileAvi').innerHTML = avi;
  document.getElementById('profileName').textContent = `${a.first_name} ${a.last_name}`;
  document.getElementById('profileBrokerage').textContent =
    [a.brokerage, a.state].filter(Boolean).join(' · ');

  const meta = [];
  if (a.phone) meta.push(`<div class="meta-item">📞 <a href="tel:${a.phone}">${a.phone}</a></div>`);
  if (a.email) meta.push(`<div class="meta-item">📧 <a href="mailto:${a.email}">${a.email}</a></div>`);
  if (a.website) meta.push(`<div class="meta-item">🌐 <a href="${a.website}" target="_blank">${a.website.replace(/^https?:\/\//,'')}</a></div>`);
  if (a.markets_served) meta.push(`<div class="meta-item">📍 ${a.markets_served}</div>`);
  if (a.commission_rate) meta.push(`<div class="meta-item">💰 ${a.commission_rate} commission</div>`);
  document.getElementById('profileMeta').innerHTML = meta.join('');

  if (a.bio) document.getElementById('profileBio').textContent = a.bio;

  // Actions
  const myId = GOZ_AUTH.getAgentId();
  const actions = [];
  if (a.email) {
    actions.push(`<a class="contact-agent-btn" href="mailto:${a.email}">Contact ${a.first_name} →</a>`);
  }
  if (myId === agentId) {
    actions.push(`<button onclick="toggleEdit(true)" style="background:transparent;border:1.5px solid var(--blue);color:var(--blue);padding:12px 24px;border-radius:8px;font-family:'Nunito',sans-serif;font-weight:700;font-size:14px;cursor:pointer">Edit Profile</button>`);
    actions.push(`<a href="dashboard.html" style="background:var(--navy);color:white;padding:12px 24px;border-radius:8px;font-family:'Nunito',sans-serif;font-weight:700;font-size:14px;text-decoration:none">← Dashboard</a>`);
  }
  document.getElementById('profileActions').innerHTML = actions.join('');
}

async function loadListings() {
  try {
    const myId = GOZ_AUTH.getAgentId();
    const token = myId === agentId ? (await GOZ_AUTH.getValidToken()) : null;

    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/listings?agent_id=eq.${agentId}&order=created_at.desc`,
      {
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${token || SUPABASE_ANON_KEY}`
        }
      }
    );
    const listings = await res.json();
    const active = listings.filter(l => l.status === 'active');
    document.getElementById('listingsTitle').textContent =
      `${active.length} Active Listing${active.length !== 1 ? 's' : ''}`;

    if (!active.length) {
      document.getElementById('listingsContainer').innerHTML =
        `<div class="empty">No active listings right now.</div>`;
      return;
    }

    document.getElementById('listingsContainer').innerHTML = `<div class="listings-grid">` +
      active.map(l => `
        <div class="listing-card" onclick="window.location='listing.html?id=${l.id}'">
          <div class="listing-img">
            ${l.photos?.length ? `<img src="${l.photos[0]}" alt="${l.address}" />` : '🏡'}
          </div>
          <div class="listing-body">
            <div class="listing-price">$${Number(l.price).toLocaleString()}</div>
            <div class="listing-commission">✓ ${l.commission_rate} commission — public</div>
            <div class="listing-addr">${l.address}, ${l.city}, ${l.state}</div>
            <div class="listing-specs">${l.beds ? l.beds+'bd' : ''} ${l.baths ? l.baths+'ba' : ''} ${l.sqft ? Number(l.sqft).toLocaleString()+' sqft' : ''}</div>
          </div>
        </div>`
      ).join('') + `</div>`;
  } catch (e) {
    console.error('loadListings error:', e);
  }
}

// ── EDIT MODE ──
function toggleEdit(open) {
  const panel = document.getElementById('editPanel');
  if (open) {
    panel.classList.add('open');
    populateEditForm();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    panel.classList.remove('open');
  }
}

function populateEditForm() {
  const a = currentAgent;
  document.getElementById('ef_first').value = a.first_name || '';
  document.getElementById('ef_last').value = a.last_name || '';
  document.getElementById('ef_phone').value = a.phone || '';
  document.getElementById('ef_brokerage').value = a.brokerage || '';
  document.getElementById('ef_license').value = a.license_number || '';
  document.getElementById('ef_state').value = a.state || '';
  document.getElementById('ef_commission').value = a.commission_rate || '2.5%';
  document.getElementById('ef_website').value = a.website || '';
  document.getElementById('ef_markets').value = a.markets_served || '';
  document.getElementById('ef_bio').value = a.bio || '';

  const avi = a.photo_url
    ? `<img src="${a.photo_url}" />`
    : (a.first_name?.[0] || '') + (a.last_name?.[0] || '');
  document.getElementById('editPhotoPreview').innerHTML = avi;
}

function previewEditPhoto(e) {
  newPhotoFile = e.target.files[0];
  if (!newPhotoFile) return;
  const reader = new FileReader();
  reader.onload = ev => {
    document.getElementById('editPhotoPreview').innerHTML = `<img src="${ev.target.result}" />`;
  };
  reader.readAsDataURL(newPhotoFile);
}

async function saveProfile() {
  const btn = document.getElementById('saveBtn');
  const errEl = document.getElementById('editError');
  const successEl = document.getElementById('editSuccess');
  errEl.style.display = 'none';
  successEl.style.display = 'none';

  btn.disabled = true;
  btn.textContent = 'Saving...';

  try {
    const token = await GOZ_AUTH.getValidToken();
    if (!token) throw new Error('Session expired. Please sign in again.');

    // Upload new photo if selected
    let photoUrl = currentAgent.photo_url;
    if (newPhotoFile) {
      btn.textContent = 'Uploading photo...';
      const ext = newPhotoFile.name.split('.').pop().toLowerCase();
      const path = `agents/${agentId}/profile.${ext}`;
      const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/listing-photos/${path}`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${token}`,
          'Content-Type': newPhotoFile.type,
          'x-upsert': 'true'
        },
        body: newPhotoFile
      });
      if (uploadRes.ok) {
        photoUrl = `${SUPABASE_URL}/storage/v1/object/public/listing-photos/${path}`;
      }
    }

    btn.textContent = 'Saving profile...';

    const updates = {
      first_name: document.getElementById('ef_first').value.trim(),
      last_name: document.getElementById('ef_last').value.trim(),
      phone: document.getElementById('ef_phone').value.trim() || null,
      brokerage: document.getElementById('ef_brokerage').value.trim() || null,
      license_number: document.getElementById('ef_license').value.trim() || null,
      state: document.getElementById('ef_state').value || null,
      commission_rate: document.getElementById('ef_commission').value,
      website: document.getElementById('ef_website').value.trim() || null,
      markets_served: document.getElementById('ef_markets').value.trim() || null,
      bio: document.getElementById('ef_bio').value.trim() || null,
      photo_url: photoUrl
    };

    const res = await fetch(`${SUPABASE_URL}/rest/v1/agents?id=eq.${agentId}`, {
      method: 'PATCH',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${token}`,
        'Prefer': 'return=representation'
      },
      body: JSON.stringify(updates)
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.message || 'Update failed');
    }

    // Update local name
    localStorage.setItem('goz_agent_name', `${updates.first_name} ${updates.last_name}`);
    currentAgent = { ...currentAgent, ...updates };

    successEl.textContent = '✅ Profile updated!';
    successEl.style.display = 'block';
    renderProfile();
    newPhotoFile = null;

    setTimeout(() => toggleEdit(false), 1500);

  } catch (err) {
    errEl.textContent = err.message;
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Save Changes →';
  }
}

function showNotFound() {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('notFoundState').style.display = 'block';
}

init();
</script>
</body>
</html>
